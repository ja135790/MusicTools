<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuning and Rhythm Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --primary: #ff5722; /* iMusic-inspired orange accent */
            --bg-dark: #1a1a1a;
            --panel-bg: #242424;
            --text-light: #e0e0e0;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: 0 auto; background: #111; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); }
        h1 { color: #fff; font-weight: 400; margin-bottom: 30px; letter-spacing: 1px; }
        
        /* NAV HUB STYLING */
        .nav-hub { display: flex; justify-content: center; gap: 15px; margin-bottom: 35px; }
        .nav-btn { background: var(--panel-bg); color: #fff; border: 2px solid #333; padding: 15px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; flex: 1; }
        .nav-btn:hover { background: #2f2f2f; border-color: var(--primary); }
        .nav-btn.active-tab { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* APP PANELS CONTAINER */
        .app-panel { display: none; background: var(--panel-bg); padding: 30px; border-radius: 12px; text-align: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .active-panel { display: block; }

        /* IMUSIC METRONOME ENGINE LAYOUT */
        .imusic-bpm-view { font-size: 5rem; font-weight: bold; color: var(--primary); margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .imusic-bpm-view input[type="text"] { background: transparent; border: none; color: var(--primary); font-size: 5rem; font-weight: bold; width: 160px; text-align: right; font-family: inherit; outline: none; }
        .imusic-bpm-unit { font-size: 1.5rem; color: #888; align-self: flex-end; margin-bottom: 15px; }
        .imusic-tempo-text { font-size: 1.1rem; color: #aaa; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        
        .slider-row { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 500px; margin: 0 auto 30px auto; }
        .circle-inc-dec { width: 45px; height: 45px; border-radius: 50%; background: #333; color: #fff; border: none; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .circle-inc-dec:hover { background: #444; }
        input[type="range"].imusic-slider { flex-grow: 1; accent-color: var(--primary); background: #444; height: 4px; border-radius: 2px; cursor: pointer; }

        .action-row { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 35px; }
        .imusic-tap-btn { background: #fff; color: #111; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .imusic-play-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4); }

        .settings-block { border-top: 1px solid #333; padding-top: 20px; max-width: 600px; margin: 0 auto; text-align: left; }
        .setting-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 0.95rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        /* SUBDIVISION ICON SELECTORS */
        .subdivision-grid { display: flex; gap: 10px; margin-top: 5px; }
        .sub-btn { background: #333; border: 2px solid transparent; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; min-width: 55px; text-align: center; }
        .sub-btn:hover { background: #444; }
        .sub-btn.active-sub { background: var(--primary); border-color: var(--primary); }

        /* TUNING DRONE LAYOUT */
        .score-list { list-style: none; padding: 0; max-width: 650px; margin: 0 auto; }
        .score-item { background: #2d2d2d; padding: 16px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .instrument-title { font-weight: bold; font-size: 1.1rem; color: #fff; }
        .source-tag { font-size: 0.9rem; color: #ff9800; font-weight: 500; display: block; margin-top: 3px; }
        .trigger-btn { background: #00ff88; color: #111; border: none; padding: 10px 18px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .trigger-btn.active-drone { background: #ff4444; color: white; }

        /* CHROMATIC TUNER ENGINE HUDS */
        .tuner-matrix { display: flex; gap: 15px; max-width: 500px; margin: 0 auto 25px auto; }
        .tuner-input-group { flex: 1; text-align: left; }
        .tuner-input-group label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .tuner-box { width: 100%; box-sizing: border-box; background: #333; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 6px; font-size: 1.1rem; text-align: center; }
        .live-hud { background: #1a1a1a; border-radius: 12px; padding: 25px; margin: 20px auto; max-width: 500px; border: 2px solid #333; }
        .hud-pitch-line { font-size: 1.5rem; margin: 10px 0; font-weight: bold; }
        .hud-pitch-line span { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Tuning and Rhythm Dashboard</h1>

    <div class="nav-hub">
        <button class="nav-btn active-tab" onclick="switchPanel('metronome', this)">Metronome</button>
        <button class="nav-btn" onclick="switchPanel('drone', this)">Tuning Drone</button>
        <button class="nav-btn" onclick="switchPanel('tuner', this)">Chromatic Tuner</button>
    </div>

    <div id="panel-metronome" class="app-panel active-panel">
        <div class="imusic-bpm-view">
            <input type="text" id="bpmText" value="100" oninput="syncTypedBpm()" onblur="verifyBpmBounds()">
            <span class="imusic-bpm-unit">BPM</span>
        </div>
        <div class="imusic-tempo-text" id="tempoTermLabel">Moderato</div>

        <div class="slider-row">
            <button class="circle-inc-dec" onclick="stepBpm(-1)">-</button>
            <input type="range" id="metSlider" class="imusic-slider" min="20" max="350" value="100" oninput="syncSliderBpm(this.value)">
            <button class="circle-inc-dec" onclick="stepBpm(1)">+</button>
        </div>

        <div class="action-row">
            <button class="imusic-tap-btn" onclick="triggerTapTempo()">TAP</button>
            <button class="imusic-play-btn" id="metPlayBtn" onclick="toggleMetronomeEngine()">▶</button>
        </div>

        <div class="settings-block">
            <div class="setting-item">
                <label><input type="checkbox" id="stressFirst" checked> Stress First Beat</label>
                <div>
                    <button class="circle-inc-dec" style="width:30px; height:30px; font-size:1rem; display:inline-flex;" onclick="changeBeats(-1)">-</button>
                    <span id="beatsMeasureVal" style="margin: 0 10px; color:#fff; font-weight:bold;">4</span>
                    <button class="circle-inc-dec" style="width:30px; height:30px; font-size:1rem; display:inline-flex;" onclick="changeBeats(1)">+</button>
                </div>
            </div>
            <div class="setting-item" style="display:block;">
                <div>Subdivision</div>
                <div class="subdivision-grid">
                    <button class="sub-btn active-sub" id="sub-1" onclick="setSubdivisionMode(1)">♩</button>
                    <button class="sub-btn" id="sub-2" onclick="setSubdivisionMode(2)">♪</button>
                    <button class="sub-btn" id="sub-4" onclick="setSubdivisionMode(4)">♬</button>
                    <button class="sub-btn" id="sub-3" onclick="setSubdivisionMode(3)"> triplet </button>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-drone" class="app-panel">
        <div style="margin-bottom: 25px;">
            <label style="font-weight: bold; margin-right: 10px;">Select Octave:</label>
            <select id="octaveSelector" onchange="shiftDroneOctaves()" style="background:#333; color:white; padding:8px 15px; border-radius:6px; border:1px solid #444;">
                <option value="1">Octave 1 (A0 - C2)</option>
                <option value="2">Octave 2 (A1 - C3)</option>
                <option value="3">Octave 3 (A2 - C4)</option>
                <option value="4" selected>Octave 4 (A3 - C5)</option>
                <option value="5">Octave 5 (A4 - C6)</option>
                <option value="6">Octave 6 (A5 - C7)</option>
                <option value="7">Octave 7 (A6 - C8)</option>
            </select>
        </div>

        <ul class="score-list">
            <li class="score-item" style="border-left: 5px solid #00bfff;">
                <div>
                    <div class="instrument-title" style="color:#00bfff;">Pure Sine Wave</div>
                </div>
                <button class="trigger-btn" id="drone-sine" onclick="fireDroneTone('sine')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <div class="instrument-title">I. Flutes</div>
                    <span class="source-tag" id="tag-flutes">Concert Flute</span>
                </div>
                <button class="trigger-btn" id="drone-flutes" onclick="fireDroneTone('flutes')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <div class="instrument-title">II. Double Reeds</div>
                    <span class="source-tag" id="tag-doubleReeds">Oboe</span>
                </div>
                <button class="trigger-btn" id="drone-doubleReeds" onclick="fireDroneTone('doubleReeds')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <div class="instrument-title">III. Clarinets</div>
                    <span class="source-tag" id="tag-clarinets">Bb Soprano Clarinet</span>
                </div>
                <button class="trigger-btn" id="drone-clarinets" onclick="fireDroneTone('clarinets')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <div class="instrument-title">IV. Saxophones</div>
                    <span class="source-tag" id="tag-saxophones">Alto Saxophone</span>
                </div>
                <button class="trigger-btn" id="drone-saxophones" onclick="fireDroneTone('saxophones')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <span class="instrument-title">V. Brass</span>
                    <span class="source-tag" id="tag-brass">Trumpet</span>
                </div>
                <button class="trigger-btn" id="drone-brass" onclick="fireDroneTone('brass')">Trigger Drone</button>
            </li>
            <li class="score-item">
                <div>
                    <span class="instrument-title">VI. Orchestral Strings</span>
                    <span class="source-tag" id="tag-strings">Violin</span>
                </div>
                <button class="trigger-btn" id="drone-strings" onclick="fireDroneTone('strings')">Trigger Drone</button>
            </li>
        </ul>
    </div>

    <div id="panel-tuner" class="app-panel">
        <div class="tuner-matrix">
            <div class="tuner-input-group
